version: 2

models:
  - name: patients
    description: "Conformed patient demographics with HMAC pseudonymised patient_sk, IMD from LSOA join"
    tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 1
    columns:
      - name: patient_sk
        description: "HMAC-SHA-256 of NHS number - primary key"
        tests:
          - not_null
          - unique
      - name: _ingest_date
        tests:
          - not_null
      - name: age_band
        tests:
          - dbt_expectations.expect_column_values_to_be_in_set:
              value_set:
                [
                  "0-15",
                  "16-24",
                  "25-34",
                  "35-44",
                  "45-54",
                  "55-64",
                  "65-74",
                  "75+",
                ]
              config:
                severity: warn
      - name: ethnicity_ons
        tests:
          - dbt_expectations.expect_column_values_to_not_be_null:
              config:
                severity: warn
      - name: imd_decile
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 1
              max_value: 10

  - name: patient_identifiers
    description: "Caldicott-restricted patient identifiers (silver_keys schema)"
    columns:
      - name: patient_id
        tests:
          - not_null
          - unique
      - name: patient_sk
        tests:
          - not_null

  - name: patients_quarantine
    description: "Patients failing NHS Mod-11 validation (silver_quarantine schema)"
    columns:
      - name: patient_id
        tests:
          - not_null
      - name: rejection_reason
        tests:
          - not_null

  - name: encounters
    description: "EHR encounters with patient_sk FK, UTC timestamps"
    tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 1
    columns:
      - name: encounter_id
        tests:
          - not_null
          - unique
      - name: patient_sk
        tests:
          - not_null:
              severity: warn

  - name: referrals
    description: "EHR referrals with patient_sk FK, UTC timestamps"
    tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 1
    columns:
      - name: referral_id
        tests:
          - not_null
          - unique
      - name: patient_sk
        tests:
          - not_null:
              severity: warn

  - name: diagnoses
    description: "EHR coded diagnoses (ICD-10) with patient_sk FK"
    columns:
      - name: diagnosis_id
        tests:
          - not_null
          - unique
      - name: patient_sk
        tests:
          - not_null:
              severity: warn

  - name: diagnostics_orders
    description: "Trust diagnostic orders with type-conformed IDs and dates"
    columns:
      - name: diagnostic_id
        tests:
          - not_null
          - unique
      - name: patient_sk
        tests:
          - not_null:
              severity: warn

  - name: appointments
    description: "SFTP appointments with varchar-to-timestamp casts, patient_sk cross-reference"
    tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 1
    columns:
      - name: appointment_id
        tests:
          - not_null
          - unique
      - name: patient_sk
        tests:
          - not_null:
              severity: warn

  - name: urgent_care
    description: "Urgent care attendances with UTC timestamps, patient_sk FK"
    tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 1
    columns:
      - name: uc_log_id
        tests:
          - not_null
          - unique
      - name: patient_sk
        tests:
          - not_null:
              severity: warn

  - name: providers
    description: "Provider site reference - no patient linkage"
    tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 1
    columns:
      - name: provider_code
        tests:
          - not_null
          - unique
      - name: provider_id
        tests:
          - not_null
