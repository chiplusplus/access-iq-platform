# Prefect deployment config for Access-IQ pipeline.
# Deploy with: prefect deploy --prefect-file flows/prefect.yaml
name: access-iq-flows
prefect-version: "3.7.2"

deployments:
  - name: dev
    flow_name: daily-ingest
    entrypoint: access_iq_flows/daily_ingest.py:daily_ingest
    work_pool:
      name: access-iq-dev-pipeline
      work_queue_name: default
      job_variables:
        image: "{{ $PIPELINE_IMAGE_URI }}"
        cpu: "1024"
        memory: "2048"
        cluster: "{{ $ECS_CLUSTER_ARN }}"
        task_role_arn: "{{ $ECS_TASK_ROLE_ARN }}"
        execution_role_arn: "{{ $ECS_EXECUTION_ROLE_ARN }}"
        aws_credentials: "access-iq-dev-aws-creds"
    schedules:
      - cron: "0 2 * * *"
        timezone: "Europe/London"
        active: false # paused by default (D-08); make up resumes
    parameters:
      env: dev
