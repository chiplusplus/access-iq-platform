name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.11.11"

      - name: Sync workspace
        run: uv sync --all-packages

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Ruff lint
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy .

      - name: Pytest
        run: uv run pytest --cov=access_iq

  dbt-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dbt
    env:
      BRONZE_S3_PREFIX: "s3://ci-placeholder/bronze"
      REDSHIFT_LAMBDA_UDF_ROLE_ARN: "arn:aws:iam::000000000000:role/ci-placeholder"
      # ci target uses database method (no IAM handshake) so parse/compile work without Redshift
      DBT_TARGET: ci
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync dbt workspace member
        run: uv sync

      - name: Install dbt packages
        run: uv run dbt deps --profiles-dir .

      - name: dbt parse
        run: uv run dbt parse --profiles-dir .
