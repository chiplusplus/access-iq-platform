version: 2

sources:
  - name: bronze_external
    schema: bronze_external
    loader: spectrum
    description: "Bronze layer via Redshift Spectrum on S3 Parquet files"
    tables:
      - name: patient_demographics
        description: "EHR patient demographics"
        external:
          location: "{{ env_var('BRONZE_S3_PREFIX') }}/source=ehr_postgres/entity=patient_demographics/"
          row_format: >
            serde 'org.apache.hadoop.hive.ql.io.parquet.serde.ParquetHiveSerDe'
          stored_as: >
            INPUTFORMAT 'org.apache.hadoop.hive.ql.io.parquet.MapredParquetInputFormat'
            OUTPUTFORMAT 'org.apache.hadoop.hive.ql.io.parquet.MapredParquetOutputFormat'
          partitions:
            - name: ingest_date
              data_type: date
              path_macro: dbt_external_tables.key_value
        columns:
          - name: patient_id
            data_type: bigint
          - name: nhs_pseudo_id
            data_type: varchar(256)
          - name: date_of_birth
            data_type: date
          - name: age
            data_type: bigint
          - name: age_band
            data_type: varchar(20)
          - name: sex
            data_type: varchar(10)
          - name: ethnicity_ons
            data_type: varchar(10)
          - name: imd_decile
            data_type: bigint
          - name: chronic_conditions_count
            data_type: bigint
          - name: lsoa_code
            data_type: varchar(20)
          - name: postcode_sector
            data_type: varchar(10)
          - name: registered_gp_practice_id
            data_type: varchar(20)
          - name: registration_start_date
            data_type: date
          - name: registration_end_date
            data_type: date
          - name: is_active
            data_type: boolean
          - name: updated_at
            data_type: timestamp

      - name: encounters
        description: "EHR patient encounters"
        external:
          location: "{{ env_var('BRONZE_S3_PREFIX') }}/source=ehr_postgres/entity=encounters/"
          row_format: >
            serde 'org.apache.hadoop.hive.ql.io.parquet.serde.ParquetHiveSerDe'
          stored_as: >
            INPUTFORMAT 'org.apache.hadoop.hive.ql.io.parquet.MapredParquetInputFormat'
            OUTPUTFORMAT 'org.apache.hadoop.hive.ql.io.parquet.MapredParquetOutputFormat'
          partitions:
            - name: ingest_date
              data_type: date
              path_macro: dbt_external_tables.key_value
        columns:
          - name: encounter_id
            data_type: bigint
          - name: patient_id
            data_type: bigint
          - name: provider_id
            data_type: bigint
          - name: encounter_datetime_start
            data_type: timestamp
          - name: encounter_datetime_end
            data_type: timestamp
          - name: encounter_type
            data_type: varchar(50)
          - name: source_system
            data_type: varchar(50)
          - name: clinician_id
            data_type: bigint
          - name: priority
            data_type: varchar(20)
          - name: was_attended
            data_type: boolean
          - name: first_attendance_flag
            data_type: boolean
          - name: primary_condition_code
            data_type: varchar(20)
          - name: wait_time_days
            data_type: bigint
          - name: created_at
            data_type: timestamp
          - name: updated_at
            data_type: timestamp

      - name: provider_site_reference
        description: "Trust provider sites and services reference data"
        external:
          location: "{{ env_var('BRONZE_S3_PREFIX') }}/source=trust_s3_provider_ref/entity=provider_site_reference/"
          row_format: >
            serde 'org.apache.hadoop.hive.ql.io.parquet.serde.ParquetHiveSerDe'
          stored_as: >
            INPUTFORMAT 'org.apache.hadoop.hive.ql.io.parquet.MapredParquetInputFormat'
            OUTPUTFORMAT 'org.apache.hadoop.hive.ql.io.parquet.MapredParquetOutputFormat'
          partitions:
            - name: ingest_date
              data_type: date
              path_macro: dbt_external_tables.key_value
        columns:
          - name: provider_code
            data_type: varchar(20)
          - name: site_name
            data_type: varchar(200)
          - name: provider_type
            data_type: varchar(50)
          - name: parent_trust_name
            data_type: varchar(200)
          - name: ics_region
            data_type: varchar(100)
          - name: address_line_1
            data_type: varchar(200)
          - name: city
            data_type: varchar(100)
          - name: postcode
            data_type: varchar(10)
          - name: postcode_sector
            data_type: varchar(10)
          - name: lsoa_code
            data_type: varchar(20)
          - name: is_main_site
            data_type: varchar(10)
          - name: site_status
            data_type: varchar(20)
          - name: has_ed
            data_type: varchar(10)
          - name: has_inpatient_beds
            data_type: varchar(10)
          - name: size_band
            data_type: varchar(20)
          - name: opening_hours
            data_type: varchar(50)
          - name: service_lines
            data_type: varchar(500)
          - name: site_manager_name
            data_type: varchar(100)
          - name: site_manager_email
            data_type: varchar(100)

      - name: diagnostics_orders
        description: "Trust diagnostic orders (lab, imaging)"
        external:
          location: "{{ env_var('BRONZE_S3_PREFIX') }}/source=trust_s3_diagnostics/entity=diagnostics_orders/"
          row_format: >
            serde 'org.apache.hadoop.hive.ql.io.parquet.serde.ParquetHiveSerDe'
          stored_as: >
            INPUTFORMAT 'org.apache.hadoop.hive.ql.io.parquet.MapredParquetInputFormat'
            OUTPUTFORMAT 'org.apache.hadoop.hive.ql.io.parquet.MapredParquetOutputFormat'
          partitions:
            - name: ingest_date
              data_type: date
              path_macro: dbt_external_tables.key_value
        columns:
          - name: diagnostic_id
            data_type: varchar(20)
          - name: patient_id
            data_type: varchar(20)
          - name: referral_id
            data_type: varchar(20)
          - name: encounter_id
            data_type: varchar(20)
          - name: provider_id
            data_type: varchar(20)
          - name: test_type
            data_type: varchar(50)
          - name: test_panel
            data_type: varchar(50)
          - name: request_date
            data_type: varchar(10)
          - name: performed_date
            data_type: varchar(10)
          - name: result_date
            data_type: varchar(10)
          - name: result_flag
            data_type: varchar(20)

      - name: appointments
        description: "SFTP appointment drops"
        external:
          location: "{{ env_var('BRONZE_S3_PREFIX') }}/source=sftp_appointments/entity=appointments/"
          row_format: >
            serde 'org.apache.hadoop.hive.ql.io.parquet.serde.ParquetHiveSerDe'
          stored_as: >
            INPUTFORMAT 'org.apache.hadoop.hive.ql.io.parquet.MapredParquetInputFormat'
            OUTPUTFORMAT 'org.apache.hadoop.hive.ql.io.parquet.MapredParquetOutputFormat'
          partitions:
            - name: ingest_date
              data_type: date
              path_macro: dbt_external_tables.key_value
        columns:
          - name: appointment_id
            data_type: varchar(36)
          - name: patient_id
            data_type: varchar(36)
          - name: nhs_pseudo_id
            data_type: varchar(256)
          - name: registered_gp_practice_id
            data_type: varchar(20)
          - name: service_location_id
            data_type: varchar(36)
          - name: clinician_id
            data_type: varchar(36)
          - name: appointment_start_datetime
            data_type: varchar(30)
          - name: appointment_end_datetime
            data_type: varchar(30)
          - name: appointment_type
            data_type: varchar(50)
          - name: mode
            data_type: varchar(20)
          - name: slot_type
            data_type: varchar(50)
          - name: booking_status
            data_type: varchar(20)
          - name: booking_created_datetime
            data_type: varchar(30)
          - name: booking_updated_datetime
            data_type: varchar(30)
          - name: wait_time_days
            data_type: varchar(10)
          - name: imd_decile
            data_type: varchar(5)

      - name: urgent_care_logs
        description: "Urgent care attendances"
        external:
          location: "{{ env_var('BRONZE_S3_PREFIX') }}/source=urgent_care_postgres/entity=urgent_care_logs/"
          row_format: >
            serde 'org.apache.hadoop.hive.ql.io.parquet.serde.ParquetHiveSerDe'
          stored_as: >
            INPUTFORMAT 'org.apache.hadoop.hive.ql.io.parquet.MapredParquetInputFormat'
            OUTPUTFORMAT 'org.apache.hadoop.hive.ql.io.parquet.MapredParquetOutputFormat'
          partitions:
            - name: ingest_date
              data_type: date
              path_macro: dbt_external_tables.key_value
        columns:
          - name: uc_log_id
            data_type: bigint
          - name: patient_id
            data_type: bigint
          - name: provider_id
            data_type: bigint
          - name: encounter_id
            data_type: bigint
          - name: arrival_datetime
            data_type: timestamp
          - name: triage_datetime
            data_type: timestamp
          - name: seen_by_clinician_datetime
            data_type: timestamp
          - name: departure_datetime
            data_type: timestamp
          - name: triage_category
            data_type: varchar(20)
          - name: presenting_complaint
            data_type: varchar(200)
          - name: outcome
            data_type: varchar(50)
          - name: source_system
            data_type: varchar(50)
          - name: created_at
            data_type: timestamp
          - name: updated_at
            data_type: timestamp
