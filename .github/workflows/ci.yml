name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          uv venv
          . .venv/bin/activate
          uv pip install -e ".[dev]"

      - name: Ruff format check
        run: |
          . .venv/bin/activate
          ruff format --check .

      - name: Ruff lint
        run: |
          . .venv/bin/activate
          ruff check .

      - name: Mypy
        run: |
          . .venv/bin/activate
          mypy .

      - name: Pytest
        run: |
          . .venv/bin/activate
          pytest --cov=access_iq
