version: 2

sources:
  - name: bronze_external
    schema: bronze_external
    loader: spectrum
    description: "Bronze layer via Redshift Spectrum on S3 Parquet files"
    tables:
      - name: patients
        description: "EHR patient demographics"
        external:
          location: "{{ env_var('BRONZE_S3_PREFIX') }}/source=ehr/entity=patients/"
          row_format: >
            serde 'org.apache.hadoop.hive.ql.io.parquet.serde.ParquetHiveSerDe'
          stored_as: >
            INPUTFORMAT 'org.apache.hadoop.hive.ql.io.parquet.MapredParquetInputFormat'
            OUTPUTFORMAT 'org.apache.hadoop.hive.ql.io.parquet.MapredParquetOutputFormat'
          partitions:
            - name: ingest_date
              data_type: date
              path_macro: dbt_external_tables.key_value
        columns:
          - name: patient_id
            data_type: varchar(36)
          - name: nhs_number
            data_type: varchar(10)
          - name: given_name
            data_type: varchar(100)
          - name: family_name
            data_type: varchar(100)
          - name: date_of_birth
            data_type: date
          - name: gender
            data_type: varchar(10)
          - name: ethnicity_code
            data_type: varchar(5)
          - name: postcode
            data_type: varchar(10)
          - name: imd_decile
            data_type: integer
          - name: registered_gp
            data_type: varchar(100)
          - name: created_at
            data_type: timestamp

      - name: encounters
        description: "EHR patient encounters"
        external:
          location: "{{ env_var('BRONZE_S3_PREFIX') }}/source=ehr/entity=encounters/"
          row_format: >
            serde 'org.apache.hadoop.hive.ql.io.parquet.serde.ParquetHiveSerDe'
          stored_as: >
            INPUTFORMAT 'org.apache.hadoop.hive.ql.io.parquet.MapredParquetInputFormat'
            OUTPUTFORMAT 'org.apache.hadoop.hive.ql.io.parquet.MapredParquetOutputFormat'
          partitions:
            - name: ingest_date
              data_type: date
              path_macro: dbt_external_tables.key_value
        columns:
          - name: encounter_id
            data_type: varchar(36)
          - name: patient_id
            data_type: varchar(36)
          - name: encounter_type
            data_type: varchar(50)
          - name: encounter_date
            data_type: timestamp
          - name: discharge_date
            data_type: timestamp
          - name: specialty_code
            data_type: varchar(10)
          - name: provider_id
            data_type: varchar(36)
          - name: site_code
            data_type: varchar(10)
          - name: icd10_primary
            data_type: varchar(10)
          - name: created_at
            data_type: timestamp

      - name: appointments
        description: "EHR scheduled appointments"
        external:
          location: "{{ env_var('BRONZE_S3_PREFIX') }}/source=ehr/entity=appointments/"
          row_format: >
            serde 'org.apache.hadoop.hive.ql.io.parquet.serde.ParquetHiveSerDe'
          stored_as: >
            INPUTFORMAT 'org.apache.hadoop.hive.ql.io.parquet.MapredParquetInputFormat'
            OUTPUTFORMAT 'org.apache.hadoop.hive.ql.io.parquet.MapredParquetOutputFormat'
          partitions:
            - name: ingest_date
              data_type: date
              path_macro: dbt_external_tables.key_value
        columns:
          - name: appointment_id
            data_type: varchar(36)
          - name: patient_id
            data_type: varchar(36)
          - name: appointment_date
            data_type: timestamp
          - name: specialty_code
            data_type: varchar(10)
          - name: provider_id
            data_type: varchar(36)
          - name: site_code
            data_type: varchar(10)
          - name: status
            data_type: varchar(20)
          - name: referral_date
            data_type: date
          - name: created_at
            data_type: timestamp

      - name: urgent_care
        description: "Urgent care attendances"
        external:
          location: "{{ env_var('BRONZE_S3_PREFIX') }}/source=urgent_care/entity=attendances/"
          row_format: >
            serde 'org.apache.hadoop.hive.ql.io.parquet.serde.ParquetHiveSerDe'
          stored_as: >
            INPUTFORMAT 'org.apache.hadoop.hive.ql.io.parquet.MapredParquetInputFormat'
            OUTPUTFORMAT 'org.apache.hadoop.hive.ql.io.parquet.MapredParquetOutputFormat'
          partitions:
            - name: ingest_date
              data_type: date
              path_macro: dbt_external_tables.key_value
        columns:
          - name: attendance_id
            data_type: varchar(36)
          - name: patient_id
            data_type: varchar(36)
          - name: arrival_time
            data_type: timestamp
          - name: triage_time
            data_type: timestamp
          - name: treatment_time
            data_type: timestamp
          - name: departure_time
            data_type: timestamp
          - name: acuity
            data_type: integer
          - name: chief_complaint
            data_type: varchar(200)
          - name: disposition
            data_type: varchar(50)
          - name: created_at
            data_type: timestamp

      - name: diagnostics
        description: "Trust diagnostics exports"
        external:
          location: "{{ env_var('BRONZE_S3_PREFIX') }}/source=trust_s3/entity=diagnostics/"
          row_format: >
            serde 'org.apache.hadoop.hive.ql.io.parquet.serde.ParquetHiveSerDe'
          stored_as: >
            INPUTFORMAT 'org.apache.hadoop.hive.ql.io.parquet.MapredParquetInputFormat'
            OUTPUTFORMAT 'org.apache.hadoop.hive.ql.io.parquet.MapredParquetOutputFormat'
          partitions:
            - name: ingest_date
              data_type: date
              path_macro: dbt_external_tables.key_value
        columns:
          - name: diagnostic_id
            data_type: varchar(36)
          - name: patient_id
            data_type: varchar(36)
          - name: test_type
            data_type: varchar(100)
          - name: test_date
            data_type: date
          - name: result
            data_type: varchar(200)
          - name: requesting_provider_id
            data_type: varchar(36)
          - name: created_at
            data_type: timestamp

      - name: providers
        description: "Trust provider reference data"
        external:
          location: "{{ env_var('BRONZE_S3_PREFIX') }}/source=trust_s3/entity=provider_ref/"
          row_format: >
            serde 'org.apache.hadoop.hive.ql.io.parquet.serde.ParquetHiveSerDe'
          stored_as: >
            INPUTFORMAT 'org.apache.hadoop.hive.ql.io.parquet.MapredParquetInputFormat'
            OUTPUTFORMAT 'org.apache.hadoop.hive.ql.io.parquet.MapredParquetOutputFormat'
          partitions:
            - name: ingest_date
              data_type: date
              path_macro: dbt_external_tables.key_value
        columns:
          - name: provider_id
            data_type: varchar(36)
          - name: provider_name
            data_type: varchar(200)
          - name: specialty_code
            data_type: varchar(10)
          - name: site_code
            data_type: varchar(10)
          - name: active
            data_type: boolean
          - name: created_at
            data_type: timestamp
